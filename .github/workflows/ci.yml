name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  mlton:
    name: MLton (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MLton
        run: sudo apt-get update && sudo apt-get install -y mlton
      - name: Run tests
        run: make test
  polyml:
    name: Poly/ML (test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Poly/ML
        run: sudo apt-get update && sudo apt-get install -y polyml libpolyml-dev
      - name: Run tests
        # Poly/ML 5.7.1 (Ubuntu) has an intermittent code-generator bug
        # ("InternalError: asGenReg raised while compiling"). It is not a fault
        # in this library, so retry the compile/test a few times to absorb it.
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::Poly/ML attempt $attempt"
            if make clean >/dev/null 2>&1; make test-poly; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; retrying..."
          done
          echo "Poly/ML test failed after 5 attempts"
          exit 1
